<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stateshire — Resource Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:#0b1120;}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-track{background:rgba(255,255,255,0.03);}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px;}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.4);cursor:pointer;}
    select option{background:#111827;}
    input,select,button{font-family:'IBM Plex Mono',monospace;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fade-in{animation:fadeIn 0.25s ease forwards;}
    .spin{animation:spin 1s linear infinite;display:inline-block;}
  </style>
  <script type="module" crossorigin src="/assets/app.js"></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
